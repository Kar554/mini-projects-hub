<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generateur de gradient</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="form-gradient">
        <div class="affichage"></div>
        <div class="parent">
            <div class="element">
    <label for="direction">Direction</label>
<select id="direction">
    <option value="to top">Haut</option>
    <option value="to right">Droite</option>
    <option value="to bottom">Bas</option>
    <option value="to left">Gauche</option>

    <option value="to top right">Haut → Droite</option>
    <option value="to top left">Haut → Gauche</option>
    <option value="to bottom right">Bas → Droite</option>
    <option value="to bottom left">Bas → Gauche</option>

    <option value="0deg">0°</option>
    <option value="45deg">45°</option>
    <option value="90deg" selected>90°</option>
    <option value="135deg">135°</option>
    <option value="180deg">180°</option>
    <option value="225deg">225°</option>
    <option value="270deg">270°</option>
    <option value="315deg">315°</option>
</select>

        </div>
        <div class="element">
            <label for="">couleur</label>
            <div class="color">
            <input type="color" id="color1" value="#977DFE">
            <input type="color" id="color2" value="#6878FF">
            </div>
        </div>
        </div>
        <div class="code"></div>
        <div class="but">
            <button class="ramdom" onclick="rand()">couleurs aléatoire</button>
            <button class="copy" onclick="copi()">Copie le code</button>
        </div>
    </div>
    <script src="./assets/js/script.js"></script>
</body>
</html>
