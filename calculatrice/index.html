<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice electronique</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="form-calculator">
        <em>Porpo</em>
        <div class="champ">
        <input type="text" id="input">
        <p></p>
        </div>
        <div class="element">
            <button class="clear" onclick="clea()">C</button>
            <button class="del" onclick="cal('/')">/</button>
            <button class="del" onclick="cal('*')">x</button>
            <button class="del" onclick="del()">Del</button>
        </div>
        <div class="element">
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button class="del" onclick="cal('-')">-</button>
        </div>
        <div class="element">
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button class="del" onclick="cal('+')">+</button>
        </div>
        <div class="parent-element">

            <div class="content-element">
        <div class="element">
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('00')">00</button>
            <!-- <button onclick="press('')"></button> -->
        </div>
        <div class="element">
            <button onclick="cal('%')">%</button>
            <button onclick="press('0')">0</button>
            <button onclick="press('.')">,</button>

        </div>
        </div>

        <button class="egale" onclick="egale()">=</button>
        </div>

    </div>
    <script src="./assets/js/script.js"></script>
</body>
</html>
